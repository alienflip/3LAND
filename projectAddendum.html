<html  style="background-color: black;">
  <head style="background-color: black;">
    <style>
      button {
				transition: all .5s ease;
				color: #fff;
				border: 3px solid white;
				font-family:'Montserrat', sans-serif;
				text-transform: uppercase;
				text-align: center;
				line-height: 1;
				font-size: 17px;
				background-color : black;
				padding: 10px;
				outline: none;
				border-radius: 4px;
				margin: 20px;
			}
			
			button:hover {
				color: #001F3F;
				background-color: #fff;
			}
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@1,500&display=swap" rel="stylesheet">
  </head>
  <body style="background-color: black;" class = "animate__animated animate__backInDown animate_slower">
    <button id = "main">Main</button>
    <script>
      var buttons = document.getElementsByTagName("button");
				for (let i = 0; i < buttons.length; i++) {
					buttons[i].addEventListener("click", onButtonClick, false);
				};
				function onButtonClick(event) {
					if(event.target.id === "main"){
						window.location.href = "index.html";
					}
        }
    </script>
    <div style = "padding:20px; background-color: black;">
      <iframe src="QuantumGeometryAddendum.pdf?_embed=iframe" style = "width:100%; height: 100%" class="animate__animated animate__fadeIn animate_slower animate__delay-1s"></iframe>
    </div>
  </body>
</html>
